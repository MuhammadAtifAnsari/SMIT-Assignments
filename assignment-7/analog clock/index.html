<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Clock</title>
    <link rel="stylesheet" href="./style.css" type="text/css">
</head>
<body>
    <div id="greet"></div>
    <div class="clock">
        <div class="point"></div>
        <div class="hours hours-1">1</div>
        <div class="hours hours-2">2</div>
        <div class="hours hours-3">3</div>
        <div class="hours hours-4">4</div>
        <div class="hours hours-5">5</div>
        <div class="hours hours-6">6</div>
        <div class="hours hours-7">7</div>
        <div class="hours hours-8">8</div>
        <div class="hours hours-9">9</div>
        <div class="hours hours-10">10</div>
        <div class="hours hours-11">11</div>
        <div class="hours hours-12">12</div>
        <div class="brand-name">ANSARI</div>
        <!-- ARROWS -->
        <div class="min-hand-wrapper" id="min">
            <div class="min-hand">
                <div class="hand"></div>
                <div class="arrow">V</div>
            </div>
        </div>
        <div class="hours-hand-wrapper" id="hours">
            <div class="hours-hand">
                <div class="hand"></div>
                <div class="arrow">V</div>
            </div>
        </div>
        <div class="sec-hand-wrapper" id="sec">
            <div class="sec-hand">
                <div class="hand"></div>
            </div>
        </div>
        </div>
        <a href="../index.html"><button>>> BACK</button></a>
    <script src="./app.js"></script>
</body>
</html>
