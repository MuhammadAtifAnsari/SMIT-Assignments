<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    
    <div class="container">
        <br>
        <div class="login">
            <h1>Log In Form</h1>
        </div>
        
        <form class="form">
        <div id="email-div">
            <input type="email" id="email-inp" placeholder="Enter your email">
        </div>
        <br>
        <div id="password-div">
            <input type="password" id="password-inp" placeholder="Enter your password">
        </div>
        <br>
        <div id="button-div">
            <input type="submit" value="Log In" id="button-inp">
        </div>
    </form>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js" integrity="sha512-NcZdtrT77bJr4STcmsGAESr06BYGE8woZdSdEgqnpyqac7sugNO+Tr4bGwGF3MsnEkGKhU2KL2xh6Ec+BqsaHA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script type="module" src="./login.js"></script>
</body>
</html>
